name: Sync Obsidian Notes

on:
  schedule:
    # 每天凌晨 4 点运行
    - cron: '0 4 * * *'
  workflow_dispatch:

# 注意：要访问 Jrx2003/note 仓库，需要在仓库 Settings > Secrets and variables > Actions 中
# 添加一个名为 NOTE_REPO_TOKEN 的 secret，值为具有 repo 权限的 Personal Access Token

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout note repository
        uses: actions/checkout@v4
        with:
          repository: Jrx2003/note
          path: note-repo
          token: ${{ secrets.NOTE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Debug - Check directories
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo ""
          echo "Note-repo directory:"
          ls -la note-repo/ || echo "note-repo not found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync notes
        run: node scripts/sync-notes.js

      - name: Debug - Check sync result
        run: |
          echo "After sync - Current directory: $(pwd)"
          echo "Content directory:"
          ls -la content/ || echo "content directory not found"

      - name: Check for changes
        id: check_changes
        run: |
          git status
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add content/
          git commit -m "Sync notes from obsidian vault - $(date +%Y-%m-%d)"
          git push
